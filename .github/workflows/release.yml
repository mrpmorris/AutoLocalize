name: Release
on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: windows-latest
    steps:

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Compute numeric version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "numeric=${TAG%%-*}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build
        run: dotnet build "./Source/" --configuration Release -p:Version=${{ github.event.release.tag_name }} -p:AssemblyVersion=${{ steps.version.outputs.numeric }} -p:FileVersion=${{ steps.version.outputs.numeric }}

      - name: Test
        run: dotnet test "./Source/" --no-build --configuration Release

      - name: Pack
        run: |
          dotnet pack "./Source/Lib/Morris.AutoLocalize/Morris.AutoLocalize.csproj" --no-build --configuration Release -p:Version=${{ github.event.release.tag_name }} -p:AssemblyVersion=${{ steps.version.outputs.numeric }} -p:FileVersion=${{ steps.version.outputs.numeric }} -o artifacts

      - name: Push to NuGet
        run: |
          dotnet nuget push artifacts/Morris.AutoLocalize.Fody.${{ github.event.release.tag_name }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
